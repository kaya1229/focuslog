<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0; background: rgba(5, 10, 15, 0.9); color: #00f2ff;
            font-family: 'Courier New', monospace; display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh;
            border: 2px solid #00f2ff; overflow: hidden;
        }
        #preview { position: absolute; bottom: 20px; right: 20px; width: 140px; height: 100px; border: 1px solid #00f2ff; transform: scaleX(-1); }
        #timer { font-size: 80px; text-shadow: 0 0 20px #00f2ff; margin: 10px 0; }
        .setup-box { background: rgba(255,255,255,0.05); padding: 20px; border: 1px dashed #00f2ff; text-align: center; }
        .time-input-group input { width: 50px; background: none; border: 1px solid #00f2ff; color: #fff; text-align: center; padding: 5px; }
        input[type="text"] { background: none; border: 1px solid #00f2ff; color: #fff; padding: 10px; width: 250px; margin: 10px 0; }
        button { background: #00f2ff; border: none; color: #000; padding: 10px 20px; font-weight: bold; cursor: pointer; margin: 10px; }
        #fireworks { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        .success-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>
    <canvas id="fireworks"></canvas>
    <div id="status">OSD: STANDBY</div>

    <div id="setupSection" class="setup-box">
        <div class="time-input-group">
            <input type="number" id="hInput" value="0"> 시
            <input type="number" id="mInput" value="30"> 분
            <input type="number" id="sInput" value="0"> 초
        </div>
        <input type="text" id="appInput" placeholder="허용 앱 (콤마 구분: Code, Chrome)">
        <input type="text" id="quoteInput" placeholder="성공 시 출력할 멘트">
        <br>
        <button id="saveBtn">CONFIRM CONFIG</button>
    </div>

    <div id="timerSection" style="display: none;">
        <div id="timer">00:00:00</div>
        <button id="startBtn">START PROJECTION</button>
    </div>

    <div id="successOverlay" class="success-overlay">
        <h1 id="finalQuote"></h1>
        <p>STUDY VLOG SAVED IN USER DATA FOLDER</p>
        <button onclick="location.reload()">RESTART</button>
    </div>

    <video id="preview" autoplay muted></video>

    <script>
        const { ipcRenderer } = require('electron');
        const fs = require('fs');
        const path = require('path');

        let totalTargetSec = 0;
        let midCaptured = false;

        navigator.mediaDevices.getUserMedia({ video: true }).then(s => { document.getElementById('preview').srcObject = s; });

        async function capture(phase) {
            try {
                const stream = document.getElementById('preview').srcObject;
                const recorder = new MediaRecorder(stream);
                let chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const blob = new Blob(chunks, { type: 'video/webm' });
                    const buffer = Buffer.from(await blob.arrayBuffer());
                    const tPath = path.join(__dirname, `temp_${phase}_${Date.now()}.webm`);
                    fs.writeFileSync(tPath, buffer);
                    ipcRenderer.send('process-clip', { 
                        tempPath: tPath, 
                        date: new Date().toLocaleDateString(), 
                        targetTime: `${totalTargetSec}s`, 
                        phase 
                    });
                };
                recorder.start();
                setTimeout(() => recorder.stop(), 3000);
            } catch(e) { console.error("Capture Error:", e); }
        }

        document.getElementById('saveBtn').onclick = () => {
            const h = parseInt(document.getElementById('hInput').value) || 0;
            const m = parseInt(document.getElementById('mInput').value) || 0;
            const s = parseInt(document.getElementById('sInput').value) || 0;
            totalTargetSec = (h * 3600) + (m * 60) + s;

            if(totalTargetSec <= 0) return alert("시간을 설정해주세요.");
            
            ipcRenderer.send('set-config', document.getElementById('appInput').value);
            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('timerSection').style.display = 'block';
            document.getElementById('status').innerText = "OSD: READY";
        };

        document.getElementById('startBtn').onclick = () => {
            ipcRenderer.send('start-session');
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('status').innerText = "OSD: FOCUSING...";
            midCaptured = false;
            capture('START');
        };

        ipcRenderer.on('update-timer', (event, sec) => {
            const hrs = String(Math.floor(sec / 3600)).padStart(2, '0');
            const mins = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
            const secs = String(sec % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${hrs}:${mins}:${secs}`;
            
            if (sec === Math.floor(totalTargetSec / 2) && !midCaptured) {
                midCaptured = true;
                capture('MID');
            }

            if (sec >= totalTargetSec) {
                finishSession();
            }
        });

        function finishSession() {
            capture('FINISH');
            document.getElementById('successOverlay').style.display = 'flex';
            document.getElementById('finalQuote').innerText = document.getElementById('quoteInput').value || "MISSION COMPLETE";
            setTimeout(() => ipcRenderer.send('merge-vlogs'), 4000);
            startFireworks();
        }

        function startFireworks() {
            const cvs = document.getElementById('fireworks');
            const ctx = cvs.getContext('2d');
            cvs.style.display = 'block';
            cvs.width = window.innerWidth; cvs.height = window.innerHeight;
            let p = Array.from({length: 80}, () => ({
                x: cvs.width/2, y: cvs.height/2,
                vx: Math.random()*12-6, vy: Math.random()*12-6,
                c: `hsl(${Math.random()*360},100%,50%)`
            }));
            function draw() {
                ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,cvs.width,cvs.height);
                p.forEach(i => { i.x += i.vx; i.y += i.vy; i.vy += 0.15; ctx.fillStyle = i.c; ctx.fillRect(i.x, i.y, 3, 3); });
                requestAnimationFrame(draw);
            }
            draw();
        }

        ipcRenderer.on('reset-timer', (e, name) => {
            document.getElementById('timer').innerText = "SIGNAL LOST";
            document.getElementById('status').innerText = `BLOCKED BY: ${name}`;
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('startBtn').innerText = "RETRY";
        });
    </script>
</body>
</html>
