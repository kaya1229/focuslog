<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0; padding: 0; background: rgba(5, 10, 15, 0.95);
            color: #00f2ff; font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; border: 1px solid #00f2ff; overflow: hidden;
        }
        #preview {
            position: absolute; bottom: 20px; right: 20px; width: 160px; height: 120px;
            border: 1px solid #00f2ff; background: #000; transform: scaleX(-1);
            box-shadow: 0 0 10px #00f2ff;
        }
        .rec-indicator {
            position: absolute; top: 10px; right: 10px; color: red;
            font-size: 12px; font-weight: bold; display: none; animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        #timer { font-size: 80px; text-shadow: 0 0 20px #00f2ff; margin: 10px 0; }
        .setup-box input {
            background: none; border: 1px solid #00f2ff; color: #fff;
            padding: 10px; text-align: center; width: 250px;
        }
        button {
            background: #00f2ff; border: none; color: #000; padding: 12px 24px;
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        button:hover { background: #fff; }
    </style>
</head>
<body>
    <div id="status">BEAM STATUS: IDLE</div>
    <div id="recInd" class="rec-indicator">● REC</div>

    <div id="setupSection" class="setup-box">
        <p style="font-size: 10px;">ENTER TARGET APPS (e.g. Code, Chrome)</p>
        <input type="text" id="appInput" placeholder="콤마로 구분">
        <br>
        <button id="saveBtn">SET CONFIG</button>
    </div>

    <div id="timerSection" style="display: none;">
        <div id="timer">00:00</div>
        <button id="startBtn">START PROJECTION</button>
    </div>

    <video id="preview" autoplay muted></video>

    <script>
        const { ipcRenderer } = require('electron');
        const fs = require('fs');
        const path = require('path');

        let mediaRecorder;
        let recordedChunks = [];
        let targetTime = "00:00";
        let hasCapturedMid = false;

        // 웹캠 초기화
        navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
            document.getElementById('preview').srcObject = stream;
        });

        async function captureClip(phase) {
            const stream = document.getElementById('preview').srcObject;
            mediaRecorder = new MediaRecorder(stream);
            recordedChunks = [];
            
            document.getElementById('recInd').style.display = 'block';

            mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const buffer = Buffer.from(await blob.arrayBuffer());
                const tempPath = path.join(__dirname, `temp_${phase}.webm`);
                
                fs.writeFileSync(tempPath, buffer);
                ipcRenderer.send('process-clip', {
                    tempPath, 
                    date: new Date().toLocaleDateString(),
                    targetTime: targetTime,
                    phase: phase
                });
                document.getElementById('recInd').style.display = 'none';
            };

            mediaRecorder.start();
            setTimeout(() => mediaRecorder.stop(), 3000);
        }

        document.getElementById('saveBtn').onclick = () => {
            const val = document.getElementById('appInput').value;
            if(!val) return;
            ipcRenderer.send('set-allowed-apps', val);
            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('timerSection').style.display = 'block';
            targetTime = "Configured"; 
        };

        document.getElementById('startBtn').onclick = () => {
            ipcRenderer.send('start-session');
            document.getElementById('status').innerText = "BEAM STATUS: RUNNING";
            document.getElementById('startBtn').style.display = 'none';
            hasCapturedMid = false;
            captureClip('START');
        };

        ipcRenderer.on('update-timer', (event, seconds) => {
            const m = String(Math.floor(seconds / 60)).padStart(2, '0');
            const s = String(seconds % 60).padStart(2, '0');
            const display = `${m}:${s}`;
            document.getElementById('timer').innerText = display;

            // 중간 지점 촬영 (예: 10초 지점 테스트용, 나중엔 목표 시간의 50%)
            if (seconds === 10 && !hasCapturedMid) {
                hasCapturedMid = true;
                captureClip('FOCUSING');
            }
        });

        ipcRenderer.on('reset-timer', (event, appName) => {
            document.getElementById('timer').innerText = "SIGNAL LOST";
            document.getElementById('status').innerText = `BLOCKED BY: ${appName}`;
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('startBtn').innerText = "RETRY BEAM";
        });
    </script>
</body>
</html>
