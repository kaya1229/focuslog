<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0; padding: 0; background: rgba(5, 10, 15, 0.9);
            color: #00f2ff; font-family: 'Courier New', monospace;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; border: 2px solid #00f2ff; overflow: hidden;
        }
        #preview { position: absolute; bottom: 20px; right: 20px; width: 140px; height: 100px; border: 1px solid #00f2ff; transform: scaleX(-1); }
        #timer { font-size: 90px; text-shadow: 0 0 20px #00f2ff; }
        .setup-box input { background: none; border: 1px solid #00f2ff; color: #fff; padding: 10px; margin: 5px; text-align: center; }
        button { background: #00f2ff; border: none; color: #000; padding: 10px 20px; font-weight: bold; cursor: pointer; margin: 10px; }
        #fireworks { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 10; }
        .success-msg { position: fixed; top: 40%; text-align: center; display: none; z-index: 11; }
        .glitch { animation: glitch 0.2s infinite; color: red; }
        @keyframes glitch { 0% { transform: translate(2px,0); } 50% { transform: translate(-2px,0); } 100% { transform: translate(0,0); } }
    </style>
</head>
<body>
    <canvas id="fireworks"></canvas>
    <div id="status">OSD: IDLE</div>
    
    <div id="setupSection" class="setup-box">
        <input type="text" id="appInput" placeholder="허용 앱 (Code, Chrome)">
        <input type="text" id="quoteInput" placeholder="성공 멘트 (오늘도 해냈다!)">
        <br>
        <button id="saveBtn">CONFIRM CONFIG</button>
    </div>

    <div id="timerSection" style="display: none;">
        <div id="timer">00:00</div>
        <button id="startBtn">START PROJECTOR</button>
    </div>

    <div id="successOverlay" class="success-msg">
        <h1 id="finalQuote" style="font-size: 50px;"></h1>
        <p>STUDY VLOG GENERATED</p>
        <button onclick="location.reload()">NEW SESSION</button>
    </div>

    <video id="preview" autoplay muted></video>

    <script>
        const { ipcRenderer } = require('electron');
        const fs = require('fs');
        const path = require('path');

        let targetSec = 30; // 테스트를 위해 30초 성공으로 설정
        let hasMidCaptured = false;

        navigator.mediaDevices.getUserMedia({ video: true }).then(s => { document.getElementById('preview').srcObject = s; });

        async function capture(phase) {
            const stream = document.getElementById('preview').srcObject;
            const recorder = new MediaRecorder(stream);
            let chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const buffer = Buffer.from(await blob.arrayBuffer());
                const tPath = path.join(__dirname, `temp_${phase}.webm`);
                fs.writeFileSync(tPath, buffer);
                ipcRenderer.send('process-clip', { tempPath: tPath, date: new Date().toLocaleDateString(), targetTime: `${targetSec}s`, phase });
            };
            recorder.start();
            setTimeout(() => recorder.stop(), 3000);
        }

        document.getElementById('saveBtn').onclick = () => {
            ipcRenderer.send('set-allowed-apps', document.getElementById('appInput').value);
            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('timerSection').style.display = 'block';
        };

        document.getElementById('startBtn').onclick = () => {
            ipcRenderer.send('start-session');
            document.getElementById('startBtn').style.display = 'none';
            capture('START');
        };

        ipcRenderer.on('update-timer', (event, sec) => {
            const m = String(Math.floor(sec/60)).padStart(2,'0');
            const s = String(sec%60).padStart(2,'0');
            document.getElementById('timer').innerText = `${m}:${s}`;
            
            if (sec === Math.floor(targetSec/2) && !hasMidCaptured) {
                hasMidCaptured = true;
                capture('FOCUSING');
            }

            if (sec >= targetSec) {
                ipcRenderer.send('stop-tracking'); // 감시 중단 요청 (필요 시)
                showSuccess();
            }
        });

        function showSuccess() {
            capture('FINISH');
            setTimeout(() => ipcRenderer.send('merge-vlogs'), 4000); // 마지막 녹화 대기 후 병합
            document.getElementById('timerSection').style.display = 'none';
            document.getElementById('successOverlay').style.display = 'block';
            document.getElementById('finalQuote').innerText = document.getElementById('quoteInput').value || "GOAL!!";
            startFireworks();
        }

        // 간단한 폭죽 효과
        function startFireworks() {
            const cvs = document.getElementById('fireworks');
            const ctx = cvs.getContext('2d');
            cvs.style.display = 'block';
            cvs.width = window.innerWidth; cvs.height = window.innerHeight;
            let parts = Array.from({length: 100}, () => ({
                x: cvs.width/2, y: cvs.height/2,
                vx: Math.random()*10-5, vy: Math.random()*10-5,
                c: `hsl(${Math.random()*360},100%,50%)`
            }));
            function draw() {
                ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,cvs.width,cvs.height);
                parts.forEach(p => {
                    p.x += p.vx; p.y += p.vy; p.vy += 0.1;
                    ctx.fillStyle = p.c; ctx.fillRect(p.x, p.y, 4, 4);
                });
                requestAnimationFrame(draw);
            }
            draw();
        }

        ipcRenderer.on('reset-timer', (e, name) => {
            document.getElementById('timer').innerText = "LOST";
            document.getElementById('timer').classList.add('glitch');
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('startBtn').innerText = "RE-START BEAM";
        });
    </script>
</body>
</html>
